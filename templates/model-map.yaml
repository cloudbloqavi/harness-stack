# Resolve abstract model_tier -> concrete model, per platform.
#
# This is the ONLY place concrete model names live. Update this file as
# platforms ship new models; nothing else in .subagents/ changes.
# Run `harness update` (when available) to refresh it from the shipped default.
#
# Lineups below are current as of June 2026 and WILL drift — edit freely.

claude-code:
  fast:      haiku-4-5
  reasoning: sonnet-4-6
  deep:      opus-4-8
  inherit:   inherit

antigravity:
  fast:      gemini-3.5-flash
  reasoning: gemini-3-pro
  deep:      gemini-3-pro          # or claude-opus-4-6 if Claude routing enabled
  inherit:   inherit

codex:
  fast:      gpt-5.4-mini
  reasoning: gpt-5.5
  deep:      gpt-5.5               # with high reasoning effort
  inherit:   inherit
